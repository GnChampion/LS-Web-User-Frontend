services:
  - type: web
    name: ls-web-user-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Delivery / P1 backend URL the user-facing app talks to.
      - key: VITE_BACKEND_URL
        value: "https://ls-pull-push-backend.onrender.com"
      # Prototype: disable the Firebase login wall (delivery flow needs no login).
      # Set to "true" later once the Firebase web client config is supplied.
      - key: VITE_REQUIRE_AUTH
        value: "true"
      # Firebase web client config (public keys — safe to commit).
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: "land-scanner-webapp.firebaseapp.com"
      - key: VITE_FIREBASE_PROJECT_ID
        value: "land-scanner-webapp"
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: "land-scanner-webapp.firebasestorage.app"
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
